version: 2

providers:
  qwen:
    credentials:
      api_key: ${DASHSCOPE_API_KEY}
    transport:
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      timeout: 60s
    models:
      use: [qwen-max, qwen3.5-flash, qwen-image-2.0]
      overrides:
        qwen-max:
          context_window: 131072
        qwen3.5-flash:
          context_window: 1000000
        qwen-image-2.0:
          output_formats: [png]
