version: 2

providers:
  anthropic:
    credentials:
      api_key: ${ANTHROPIC_API_KEY}
    transport:
      base_url: https://api.anthropic.com
      timeout: 120s
      retry:
        max_attempts: 3
        backoff: exponential
        initial_delay: 1s
    models:
      use: [claude-opus-4-7, claude-opus-4-6, claude-sonnet-4-6]
      overrides:
        claude-opus-4-7:
          context_window: 200000
          max_output_tokens: 32000
        claude-opus-4-6:
          context_window: 200000
          max_output_tokens: 32000
        claude-sonnet-4-6:
          context_window: 200000
          max_output_tokens: 16000
