# Polaris full reference config.
# Copy this file and tailor it for a real deployment. Secrets must stay in the
# environment and should never be committed here as literals.

version: 2

imports:
  - ./providers/openai.yaml
  - ./providers/anthropic.yaml
  - ./providers/google.yaml
  - ./providers/google-vertex.yaml
  - ./providers/deepseek.yaml
  - ./providers/bytedance.yaml
  - ./providers/minimax.yaml
  - ./providers/elevenlabs.yaml
  - ./providers/xai.yaml
  - ./providers/openrouter.yaml
  - ./providers/together.yaml
  - ./providers/groq.yaml
  - ./providers/fireworks.yaml
  - ./providers/featherless.yaml
  - ./providers/moonshot.yaml
  - ./providers/glm.yaml
  - ./providers/mistral.yaml
  - ./providers/bedrock.yaml
  - ./providers/nvidia.yaml
  - ./providers/replicate.yaml
  - ./providers/qwen.yaml
  - ./providers/ollama.yaml
  - ./routing/example.yaml

runtime:
  server:
    host: 0.0.0.0
    port: 8080
    read_timeout: 30s
    write_timeout: 120s
    shutdown_timeout: 15s
    max_body_bytes: 67108864
    cors:
      enabled: true
      allowed_origins:
        - https://app.example.com
      allowed_headers: [Authorization, Content-Type, X-Request-ID, X-Polaris-Admin-Key]
      allowed_methods: [GET, POST, DELETE, OPTIONS]
      exposed_headers: [X-Request-ID, X-RateLimit-Remaining, Retry-After, X-Polaris-Fallback, X-Polaris-Resolved-Model, X-Polaris-Resolved-Provider]
      allow_credentials: false
      max_age: 1h

  auth:
    mode: virtual_keys
    external:
      provider: signed_headers
      shared_secret: ${POLARIS_EXTERNAL_AUTH_SECRET}
      max_clock_skew: 60s
      cache_ttl: 60s
    bootstrap_admin_key_hash: ${POLARIS_BOOTSTRAP_ADMIN_KEY_HASH}

  store:
    driver: postgres
    dsn: ${DATABASE_URL}
    max_connections: 20
    log_retention_days: 90
    log_buffer_size: 1000
    log_flush_interval: 5s

  cache:
    driver: redis
    url: ${REDIS_URL}
    rate_limit:
      enabled: true
      default: 60/min
      window: sliding
    response_cache:
      enabled: false
      ttl: 24h
      max_entries_per_model: 100
      similarity_threshold: 0.95

  control_plane:
    enabled: true

  tools:
    enabled: true
    local:
      echo:
        implementation: echo
      time-now:
        implementation: time.now
      math-add:
        implementation: math.add

  mcp:
    enabled: true

  pricing:
    # Optional operator overrides. Bundled defaults are always loaded first.
    file: "" # e.g. ./pricing.yaml
    reload_interval_seconds: 30
    fail_on_missing: false

  observability:
    metrics:
      enabled: true
      path: /metrics
    logging:
      level: info
      format: json
    traces:
      enabled: false
      endpoint: ${POLARIS_OTEL_ENDPOINT}
      insecure: true
      service_name: polaris
      sample_ratio: 1.0
    audit:
      enabled: true
