# Polaris local development config.
# This file is intentionally small: runtime settings live here, while provider
# defaults and routing aliases are imported from modular files.

version: 2

imports:
  - ./providers/openai.yaml
  - ./providers/anthropic.yaml
  - ./routing/local.yaml

runtime:
  server:
    host: 127.0.0.1
    port: 8080
    read_timeout: 30s
    write_timeout: 120s
    shutdown_timeout: 15s
    max_body_bytes: 67108864
    cors:
      enabled: true
      allowed_origins:
        - http://localhost
        - http://localhost:*
        - http://127.0.0.1
        - http://127.0.0.1:*
        - https://localhost
        - https://localhost:*
        - https://127.0.0.1
        - https://127.0.0.1:*
      allowed_headers: [Authorization, Content-Type, X-Request-ID, X-Polaris-Admin-Key]
      allowed_methods: [GET, POST, DELETE, OPTIONS]
      exposed_headers: [X-Request-ID, X-RateLimit-Remaining, Retry-After, X-Polaris-Fallback, X-Polaris-Resolved-Model, X-Polaris-Resolved-Provider]
      allow_credentials: false
      max_age: 1h

  auth:
    mode: none
    static_keys: []
    admin_key_hash: ""

  store:
    driver: sqlite
    dsn: ./polaris.db
    max_connections: 1
    log_retention_days: 30
    log_buffer_size: 1000
    log_flush_interval: 5s

  cache:
    driver: memory
    rate_limit:
      enabled: true
      default: 60/min
      window: sliding
    response_cache:
      enabled: false
      ttl: 24h
      max_entries_per_model: 100
      similarity_threshold: 0.95

  observability:
    metrics:
      enabled: true
      path: /metrics
    logging:
      level: info
      format: json

providers:
  openai:
    models:
      use: [gpt-5.5, gpt-4o, gpt-4o-mini, gpt-image-2]

  anthropic:
    models:
      use: [claude-opus-4-6, claude-sonnet-4-6]
