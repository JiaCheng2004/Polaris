# Env-driven live smoke config. It imports the same provider snippets as the
# reference config, then narrows expensive providers to cheaper smoke models.

version: 2

imports:
  - ./providers/openai.yaml
  - ./providers/anthropic.yaml
  - ./providers/google.yaml
  - ./providers/google-vertex.yaml
  - ./providers/deepseek.yaml
  - ./providers/bytedance.yaml
  - ./providers/minimax.yaml
  - ./providers/elevenlabs.yaml
  - ./providers/xai.yaml
  - ./providers/openrouter.yaml
  - ./providers/together.yaml
  - ./providers/groq.yaml
  - ./providers/fireworks.yaml
  - ./providers/featherless.yaml
  - ./providers/moonshot.yaml
  - ./providers/glm.yaml
  - ./providers/mistral.yaml
  - ./providers/bedrock.yaml
  - ./providers/nvidia.yaml
  - ./providers/replicate.yaml
  - ./providers/qwen.yaml
  - ./providers/ollama.yaml
  - ./routing/live-smoke.yaml

runtime:
  server:
    host: 127.0.0.1
    port: 18080
    read_timeout: 30s
    write_timeout: 120s
    shutdown_timeout: 15s
    max_body_bytes: 67108864
    cors:
      enabled: true
      allowed_origins:
        - http://localhost
        - http://localhost:*
        - http://127.0.0.1
        - http://127.0.0.1:*
      allowed_headers: [Authorization, Content-Type, X-Request-ID, X-Polaris-Admin-Key]
      allowed_methods: [GET, POST, DELETE, OPTIONS]
      exposed_headers: [X-Request-ID, X-RateLimit-Remaining, Retry-After, X-Polaris-Fallback, X-Polaris-Resolved-Model, X-Polaris-Resolved-Provider]
      allow_credentials: false
      max_age: 1h

  auth:
    mode: none
    static_keys: []
    admin_key_hash: ""

  store:
    driver: sqlite
    dsn: ./polaris-live-smoke.db
    max_connections: 1
    log_retention_days: 7
    log_buffer_size: 1000
    log_flush_interval: 1s

  cache:
    driver: memory
    rate_limit:
      enabled: false
      default: 60/min
      window: sliding
    response_cache:
      enabled: false
      ttl: 24h
      max_entries_per_model: 100
      similarity_threshold: 0.95

  observability:
    metrics:
      enabled: true
      path: /metrics
    logging:
      level: info
      format: json

providers:
  openai:
    transport:
      retry:
        max_attempts: 2
        backoff: exponential
        initial_delay: 1s
    models:
      use: [gpt-5.5, gpt-4o-mini, text-embedding-3-small, gpt-image-1, gpt-image-2, tts-1, whisper-1, gpt-4o-audio, sora-2]

  anthropic:
    transport:
      retry:
        max_attempts: 2
        backoff: exponential
        initial_delay: 1s
    models:
      use: [claude-sonnet-4-6]

  google:
    transport:
      retry:
        max_attempts: 2
        backoff: exponential
        initial_delay: 1s
    models:
      use: [gemini-2.5-flash-lite, gemini-embedding-001, nano-banana-2]

  google-vertex:
    models:
      use: [veo-3.1-generate-001]

  deepseek:
    transport:
      retry:
        max_attempts: 2
        backoff: exponential
        initial_delay: 1s
    models:
      use: [deepseek-chat, deepseek-v4-flash, deepseek-v4-pro]

  bytedance:
    transport:
      retry:
        max_attempts: 2
        backoff: exponential
        initial_delay: 2s
    models:
      use:
        - doubao-seed-2.0-pro
        - doubao-seed-1.6-vision
        - doubao-pro-256k
        - doubao-tts-2.0
        - doubao-asr-2.0
        - doubao-notes-2.0
        - doubao-podcast-2.0
        - doubao-translation-2.0
        - doubao-streaming-asr-2.0
        - doubao-interpreting-2.0
        - doubao-audio
        - doubao-seedance-2.0
        - doubao-seedance-2.0-fast
        - seedance-2.0
        - seedance-2.0-fast
        - doubao-seedream-5.0-lite
        - seedream-4.5

  bedrock:
    models:
      use: ["amazon.nova-2-lite-v1:0", "amazon.titan-embed-text-v2:0"]

  nvidia:
    models:
      use: [nvidia/NVIDIA-Nemotron-Nano-9B-v2, nvidia/llama-nemotron-embed-1b-v2]

  replicate:
    models:
      use: [minimax/video-01]

  qwen:
    models:
      use: [qwen-max, qwen-image-2.0]
