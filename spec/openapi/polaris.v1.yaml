    get: {operationId: listMCPBindings, tags: [control-plane], responses: {"200": {description: MCP binding list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: createMCPBinding, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}

components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema: {type: string}
    BindingID:
      name: binding_id
      in: path
      required: true
      schema: {type: string}
    WildcardPath:
      name: path
      in: path
      required: true
      schema: {type: string}
  requestBodies:
    JSON:
      required: true
      content:
        application/json:
          schema: {type: object}
    Multipart:
      required: true
      content:
        multipart/form-data:
          schema: {type: object}
  responses:
    JSONOK:
      description: JSON response
      content:
        application/json:
          schema: {type: object}
    Error:
      description: Polaris error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [message, type]
          additionalProperties: false
          properties:
            message: {type: string}
            type: {type: string}
            code: {type: string}
            param: {type: string}
    Usage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens: {type: integer}
        completion_tokens: {type: integer}
        total_tokens: {type: integer}
        source:
          type: string
          enum: [provider_reported, estimated, unavailable]
    Routing:
      type: object
      properties:
        providers: {type: array, items: {type: string}}
        exclude_providers: {type: array, items: {type: string}}
        prefer_cost: {type: string}
        prefer_latency: {type: string}
    ListResponse:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items: {}
    ChatCompletion:
      type: object
      required: [id, object, created, model, choices, usage]
      properties:
        id: {type: string}
        object: {type: string}
        created: {type: integer}
        model: {type: string}
        choices: {type: array, items: {type: object}}
        usage:
          $ref: "#/components/schemas/Usage"
    AsyncJob:
      type: object
      required: [id, status]
      properties:
        id: {type: string}
        job_id: {type: string}
        status: {type: string}
        model: {type: string}
        provider: {type: string}
    SessionDescriptor:
      type: object
      required: [id, client_secret]
      properties:
        id: {type: string}
        client_secret: {type: string}
        websocket_url: {type: string}
        expires_at: {type: string}
    Project:
      type: object
      required: [id, name, created_at]
      properties:
        id: {type: string}
        name: {type: string}
        description: {type: string}
        created_at: {type: string}
        archived_at: {type: string}
    UsageReport:
      type: object
      required: [total_requests, total_tokens, total_cost]
      properties:
        total_requests: {type: integer}
        total_tokens: {type: integer}
        total_cost: {type: number}
