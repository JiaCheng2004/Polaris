  /v1/policies:
    get: {operationId: listPolicies, tags: [control-plane], responses: {"200": {description: Policy list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: createPolicy, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/budgets:
    get: {operationId: listBudgets, tags: [control-plane], responses: {"200": {description: Budget list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: createBudget, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/tools:
    get: {operationId: listTools, tags: [control-plane], responses: {"200": {description: Tool list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: createTool, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/toolsets:
    get: {operationId: listToolsets, tags: [control-plane], responses: {"200": {description: Toolset list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: createToolset, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
