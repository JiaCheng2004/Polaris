    post: {operationId: createProject, tags: [control-plane], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Project, content: {application/json: {schema: {$ref: "#/components/schemas/Project"}}}}, default: {$ref: "#/components/responses/Error"}}}
