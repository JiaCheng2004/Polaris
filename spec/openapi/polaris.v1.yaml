  /v1/music/jobs/{id}:
    get: {operationId: getMusicJob, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {description: Music job, content: {application/json: {schema: {$ref: "#/components/schemas/AsyncJob"}}}}, default: {$ref: "#/components/responses/Error"}}}
    delete: {operationId: cancelMusicJob, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/music/jobs/{id}/content:
    get: {operationId: getMusicJobContent, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {description: Music content}, default: {$ref: "#/components/responses/Error"}}}

  /v1/voices:
    get: {operationId: listVoices, tags: [gateway], responses: {"200": {description: Voice list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/voices/{id}:
    get: {operationId: getVoice, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    delete: {operationId: deleteVoiceProviderSide, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/voices/{id}/archive:
