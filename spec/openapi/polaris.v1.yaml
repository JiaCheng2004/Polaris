openapi: 3.1.0
info:
  title: Polaris API
  version: 2.1.0
  summary: Machine-readable contract for the Polaris HTTP gateway.
  description: |
    This file is the CI-checkable public HTTP contract for Polaris.
    docs/API_REFERENCE.md remains the human-readable companion.
servers:
  - url: http://localhost:8080
tags:
  - name: health
  - name: mcp
  - name: gateway
  - name: control-plane
paths:
  /health:
    get: {operationId: healthLiveness, tags: [health], responses: {"200": {$ref: "#/components/responses/JSONOK"}}}
  /ready:
    get: {operationId: healthReadiness, tags: [health], responses: {"200": {$ref: "#/components/responses/JSONOK"}}}
  /metrics:
    get: {operationId: prometheusMetrics, tags: [health], responses: {"200": {description: Prometheus metrics, content: {text/plain: {schema: {type: string}}}}}}

  /mcp/{binding_id}:
    get: {operationId: mcpGetBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: mcpPostBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    put: {operationId: mcpPutBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    patch: {operationId: mcpPatchBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    head: {operationId: mcpHeadBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {description: OK}, default: {description: Error}}}
    options: {operationId: mcpOptionsBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {description: OK}, default: {description: Error}}}
    delete: {operationId: mcpDeleteBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    trace: {operationId: mcpTraceBindingRoot, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /mcp/{binding_id}/{path}:
    get: {operationId: mcpGetBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    post: {operationId: mcpPostBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    put: {operationId: mcpPutBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    patch: {operationId: mcpPatchBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    head: {operationId: mcpHeadBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {description: OK}, default: {description: Error}}}
    options: {operationId: mcpOptionsBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {description: OK}, default: {description: Error}}}
    delete: {operationId: mcpDeleteBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    trace: {operationId: mcpTraceBindingPath, tags: [mcp], parameters: [{$ref: "#/components/parameters/BindingID"}, {$ref: "#/components/parameters/WildcardPath"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}

  /v1/models:
    get: {operationId: listModels, tags: [gateway], responses: {"200": {description: Model list, content: {application/json: {schema: {$ref: "#/components/schemas/ListResponse"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/usage:
    get: {operationId: getUsage, tags: [gateway], responses: {"200": {description: Usage report, content: {application/json: {schema: {$ref: "#/components/schemas/UsageReport"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/chat/completions:
    post: {operationId: createChatCompletion, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Chat completion, content: {application/json: {schema: {$ref: "#/components/schemas/ChatCompletion"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/responses:
    post: {operationId: createResponse, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/messages:
    post: {operationId: createMessage, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/embeddings:
    post: {operationId: createEmbedding, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/tokens/count:
    post: {operationId: countTokens, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/translations:
    post: {operationId: createTranslation, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}

  /v1/images/generations:
    post: {operationId: createImageGeneration, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/images/edits:
    post: {operationId: createImageEdit, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/Multipart"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}

  /v1/video/generations:
    post: {operationId: createVideoGeneration, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Video job, content: {application/json: {schema: {$ref: "#/components/schemas/AsyncJob"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/video/generations/{id}:
    get: {operationId: getVideoGeneration, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {description: Video status, content: {application/json: {schema: {$ref: "#/components/schemas/AsyncJob"}}}}, default: {$ref: "#/components/responses/Error"}}}
    delete: {operationId: cancelVideoGeneration, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/video/generations/{id}/content:
    get: {operationId: getVideoContent, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {description: Binary video content}, default: {$ref: "#/components/responses/Error"}}}

  /v1/audio/speech:
    post: {operationId: createSpeech, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Audio bytes}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/transcriptions:
    post: {operationId: createTranscription, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/Multipart"}, responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/transcriptions/stream:
    post: {operationId: createStreamingTranscriptionSession, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Streaming transcription session, content: {application/json: {schema: {$ref: "#/components/schemas/SessionDescriptor"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/transcriptions/stream/{id}/ws:
    get: {operationId: streamingTranscriptionWebSocket, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"101": {description: WebSocket upgrade}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/sessions:
    post: {operationId: createAudioSession, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Audio session, content: {application/json: {schema: {$ref: "#/components/schemas/SessionDescriptor"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/sessions/{id}/ws:
    get: {operationId: audioSessionWebSocket, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"101": {description: WebSocket upgrade}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/interpreting/sessions:
    post: {operationId: createInterpretingSession, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Interpreting session, content: {application/json: {schema: {$ref: "#/components/schemas/SessionDescriptor"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/interpreting/sessions/{id}/ws:
    get: {operationId: interpretingWebSocket, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"101": {description: WebSocket upgrade}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/notes:
    post: {operationId: createAudioNote, tags: [gateway], requestBody: {$ref: "#/components/requestBodies/JSON"}, responses: {"200": {description: Audio note job, content: {application/json: {schema: {$ref: "#/components/schemas/AsyncJob"}}}}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/notes/{id}:
    get: {operationId: getAudioNote, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
    delete: {operationId: deleteAudioNote, tags: [gateway], parameters: [{$ref: "#/components/parameters/ID"}], responses: {"200": {$ref: "#/components/responses/JSONOK"}, default: {$ref: "#/components/responses/Error"}}}
  /v1/audio/podcasts:
